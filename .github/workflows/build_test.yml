name: Building and Testing

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '**/*.ipynb'
      - 'docs/**/*'
      - 'config/**'
      - LICENSE
      - .gitignore
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # --- Full suite with coverage ---
  test:
    name: Tests
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel
          pip install -e . || true
          pip install pytest pytest-cov codecov biopython
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run full test suite with coverage
        run: |
          python -m pytest -v --cov=protpy --cov-report=xml --cov-report=html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: ${{ matrix.python-version == '3.13' }}
        with:
          flags: protpy_coverage

  # --- Security Scan ---
  security-scan:
    name: Security Scan
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit safety

      - name: Create artifacts folder
        run: mkdir artifacts

      - name: Run pip-audit
        run: |
          pip-audit > artifacts/pip_audit_output.txt 2>&1 || true
          cat artifacts/pip_audit_output.txt
        continue-on-error: true

      - name: Run safety check
        run: |
          safety check > artifacts/safety_output.txt 2>&1 || true
          cat artifacts/safety_output.txt
        continue-on-error: true

      - name: Run Bandit
        run: |
          bandit -r protpy tests -f json > artifacts/bandit_output.json
          bandit -r protpy tests > artifacts/bandit_output.txt
          cat artifacts/bandit_output.txt

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: artifacts/

  # --- Flake8 Linter ---
  flake8-lint:
    name: Flake8 Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-docstrings

      - name: Create artifacts directory
        run: mkdir flake8_artifacts

      - name: Run flake8
        run: |
          echo "Critical errors (E9, F63, F7, F82):" | tee -a flake8_artifacts/flake8_output.txt
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics >> flake8_artifacts/flake8_output.txt 2>&1 || true
          echo "" | tee -a flake8_artifacts/flake8_output.txt
          echo "Full linting report:" | tee -a flake8_artifacts/flake8_output.txt
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics >> flake8_artifacts/flake8_output.txt 2>&1 || true
        continue-on-error: true

      - name: Upload flake8 artifact
        uses: actions/upload-artifact@v4
        with:
          name: flake8-artifact
          path: flake8_artifacts/flake8_output.txt 