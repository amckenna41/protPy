name: Deploy to TestPyPI 📦

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: ["Building and Testing"]
    branches: [ master, main ]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to TestPyPI 📦
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine build

      - name: Install package dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Security check before build
        run: |
          pip install pip-audit
          pip-audit --skip-editable
        continue-on-error: true

      - name: Build distribution packages
        run: |
          echo "Building distribution packages..."
          python -m build
          echo "Checking package integrity..."
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Upload to TestPyPI
        run: |
          echo "Uploading packages to TestPyPI..."
          twine upload --repository testpypi dist/* --verbose
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        timeout-minutes: 5

      - name: Wait for PyPI processing
        run: sleep 30s

      - name: Install and verify from TestPyPI
        run: |
          echo "Installing protpy from TestPyPI..."
          pip install -i https://test.pypi.org/simple/ protpy --upgrade --index-url https://test.pypi.org/simple/
          echo "Verifying installation..."
          python -c "import protpy; print(f'protpy {protpy.__version__} installed successfully')"
        timeout-minutes: 5
        continue-on-error: true

      - name: Verify package version
        run: |
          SOURCE_VERSION=$(python -c "import protpy; print(protpy.__version__)" 2>/dev/null || echo "unknown")
          echo "Source version: $SOURCE_VERSION"
          if [ "$SOURCE_VERSION" = "unknown" ]; then
            echo "Warning: Could not determine source version"
          fi
        continue-on-error: true

      - name: Create job summary
        if: always()
        run: |
          echo "## TestPyPI Deployment Summary 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: protpy" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Version**: 3.10" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: TestPyPI" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist" ]; then
            echo "**Artifacts Built**: $(ls -1 dist/ | wc -l) files" >> $GITHUB_STEP_SUMMARY
            ls -lh dist/ >> $GITHUB_STEP_SUMMARY
          fi
